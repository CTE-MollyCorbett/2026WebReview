<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <!-- What are tables used for? -->
    <!-- Tables are used for displaying data. -->
    <!-- NEVER use tables for layout design! -->
    <table>
        <thead>

        </thead>
        <tbody>

        </tbody>
    </table>
    table>(thead>tr>th*3)*(tbody>tr*4>td*3)
    <table>
        <thead> <!-- Header section of the table -->
            <tr> <!-- Header row -->
                <th>Unit</th> <!-- Header cell 1 -->
                <th>Topic</th> <!-- Header cell 2 -->
                <th>Project</th> <!-- Header cell 3 -->
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Unit 1</th>
                <td>Fundamentals of HTML</td>
                <td>Personal Webpage</td>
            </tr>
            <tr>
                <th>Unit 2</th>
                <td>CSS Styling</td>
                <td>Style the Personal Webpage</td>
            </tr>
            <tr>
                <th>Unit 3</th>
                <td>Cybersecurity</td>
                <td>Malware Presentation</td>
            </tr>
            <tr>
                <th>SUNY Canton</th>
                <td>CYBR 181</td>
                <td>Python Programming Projects</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
